<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>я хз какое</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #0b0f1a 0%, #1a1f2f 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            max-width: 550px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 56px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35);
            overflow: hidden;
            border: 1px solid rgba(255, 215, 150, 0.8);
        }

        .card-header {
            background: #ffffff;
            padding: 24px 24px 16px;
            text-align: center;
            border-bottom: 2px solid #f2c94c;
        }

        .card-header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(120deg, #c47b2e, #e2a526);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .meter-panel {
            background: #fefaf0;
            margin: 20px 20px 0;
            border-radius: 40px;
            padding: 16px 20px;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.02), 0 6px 12px rgba(0,0,0,0.05);
        }

        .sugar-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
        }

        .sugar-number {
            background: #2e241f;
            padding: 6px 20px;
            border-radius: 60px;
            font-family: monospace;
            font-weight: 700;
            font-size: 2.4rem;
            color: #ffd966;
            letter-spacing: 2px;
            box-shadow: inset 0 1px 3px #00000030, 0 3px 6px rgba(0,0,0,0.1);
        }

        .sugar-label {
            background: #e9dfcf;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.8rem;
            color: #7b4a2e;
        }

        .progress-section {
            margin-top: 8px;
        }

        .progress-bg {
            background: #e2d4c0;
            border-radius: 30px;
            height: 16px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #f5b042, #e9851e, #c52f1a);
            border-radius: 30px;
            transition: width 0.2s ease;
        }

        .threshold-row {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #976b42;
            padding: 0 6px;
        }

        .tap-zone {
            display: flex;
            justify-content: center;
            padding: 25px 20px 15px;
            position: relative;
        }

        .sweet-img {
            width: 280px;
            max-width: 85%;
            cursor: pointer;
            transition: transform 0.05s linear;
            filter: drop-shadow(0 16px 20px rgba(0, 0, 0, 0.25));
            /* фон полностью прозрачный после обработки canvas */
            background: transparent;
        }

        .sweet-img:active {
            transform: scale(0.94);
        }

        .stats-panel {
            display: flex;
            justify-content: space-between;
            background: #fff6ea;
            margin: 5px 20px 20px;
            padding: 12px 24px;
            border-radius: 60px;
            border: 1px solid #ffe1b3;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #c46d1a;
        }

        .stat-desc {
            font-size: 0.7rem;
            font-weight: 600;
            color: #8c6a47;
            text-transform: uppercase;
        }

        .reset-button {
            display: flex;
            justify-content: center;
            margin: 0 20px 25px;
        }

        .insulin {
            background: #fae4bc;
            border: none;
            padding: 14px 28px;
            border-radius: 100px;
            font-weight: 800;
            font-size: 1rem;
            color: #9b4a1a;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            box-shadow: 0 5px 0 #cfaa7a;
            transition: 0.07s linear;
            width: 80%;
            justify-content: center;
        }

        .insulin:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #cfaa7a;
        }

        .tap-pop {
            position: fixed;
            pointer-events: none;
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #ffc107, #ff8c00);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            z-index: 1000;
            animation: floatUp 0.5s ease-out forwards;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0px) scale(0.6); }
            100% { opacity: 0; transform: translateY(-70px) scale(1.2); }
        }

        .sound-toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #2b2b2be6;
            backdrop-filter: blur(12px);
            padding: 8px 18px;
            border-radius: 60px;
            color: #ffdd99;
            font-weight: 600;
            font-size: 0.85rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s;
            z-index: 1100;
        }

        @media (max-width: 500px) {
            .sugar-number { font-size: 1.8rem; padding: 4px 16px; }
            .stat-value { font-size: 1.4rem; }
            .sweet-img { width: 220px; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <h1>🍬 я хз какое 🍭</h1>
    </div>

    <div class="meter-panel">
        <div class="sugar-row">
            <span class="sugar-number" id="sugarValue">0.0</span>
            <span class="sugar-label">🩸 ммоль/л</span>
        </div>
        <div class="progress-section">
            <div class="progress-bg">
                <div class="progress-fill" id="sugarFill"></div>
            </div>
            <div class="threshold-row">
                <span>⚠️ 4.2</span> <span>⚠️ 5.2</span> <span>⚠️ 6.7</span> <span>💀 22.8</span>
            </div>
        </div>
    </div>

    <div class="tap-zone">
        <img src="photo/sniker.png" alt="Сникерс" class="sweet-img" id="snickersImage" crossorigin="anonymous">
    </div>

    <div class="stats-panel">
        <div class="stat">
            <div class="stat-value" id="clicksCount">0</div>
            <div class="stat-desc">🍫 натапано</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="soundCount">0</div>
            <div class="stat-desc">🔊 звуков</div>
        </div>
    </div>

    <div class="reset-button">
        <button class="insulin" id="insulinReset">💉 КОЛОТЬ ИНСУЛИН (сброс) 💉</button>
    </div>
</div>
<div id="soundFloating" class="sound-toast">🔊 порог!</div>

<script>
    (function() {
        // Пути
        const IMG_PATH = "photo/sniker.png";
        const SOUND_PATH = "zvuk/foto.mp3";
        const THRESHOLDS = [4.2, 5.2, 6.7, 22.8];

        // Состояние
        let currentSugar = 0.0;
        let totalTaps = 0;
        let soundTriggered = { 4.2: false, 5.2: false, 6.7: false, 22.8: false };
        let totalSounds = 0;
        let processedImageSrc = null; // dataURL обработанной картинки

        // DOM
        const sugarSpan = document.getElementById('sugarValue');
        const sugarFill = document.getElementById('sugarFill');
        const clicksSpan = document.getElementById('clicksCount');
        const soundCountSpan = document.getElementById('soundCount');
        const snickersImg = document.getElementById('snickersImage');
        const resetBtn = document.getElementById('insulinReset');
        const soundToast = document.getElementById('soundFloating');
        const MAX_BAR = 26.0;

        // Обновление UI
        function updateUI() {
            sugarSpan.innerText = currentSugar.toFixed(1);
            let percent = (currentSugar / MAX_BAR) * 100;
            if (percent > 100) percent = 100;
            sugarFill.style.width = `${percent}%`;
            if (currentSugar >= 18) sugarSpan.style.color = "#ea6a5e";
            else if (currentSugar >= 10) sugarSpan.style.color = "#f5b042";
            else sugarSpan.style.color = "#ffd966";
            clicksSpan.innerText = totalTaps;
            soundCountSpan.innerText = totalSounds;
        }

        // Воспроизведение звука
        function playSound() {
            try {
                const audio = new Audio(SOUND_PATH);
                audio.volume = 0.7;
                audio.play().catch(() => {
                    soundToast.style.opacity = "1";
                    soundToast.innerText = "⚠️ нет foto.mp3 в папке zvuk";
                    setTimeout(() => soundToast.style.opacity = "0", 1500);
                });
                soundToast.style.opacity = "1";
                soundToast.innerText = "🔊 Звук!";
                setTimeout(() => soundToast.style.opacity = "0", 800);
            } catch(e) {}
        }

        function flashPanel(threshold) {
            const panel = document.querySelector('.meter-panel');
            if (panel) {
                panel.style.transition = "0.08s";
                panel.style.backgroundColor = "#ffecb3";
                panel.style.boxShadow = "0 0 0 2px #ffb347";
                setTimeout(() => {
                    panel.style.backgroundColor = "#fefaf0";
                    panel.style.boxShadow = "";
                }, 250);
            }
            const msg = document.createElement('div');
            msg.innerText = `⚡ ${threshold} ммоль/л! ЗВУК! ⚡`;
            msg.style.position = 'fixed';
            msg.style.bottom = '35%';
            msg.style.left = '50%';
            msg.style.transform = 'translateX(-50%)';
            msg.style.backgroundColor = '#1f1a15dd';
            msg.style.backdropFilter = 'blur(8px)';
            msg.style.color = '#ffcd7e';
            msg.style.padding = '6px 18px';
            msg.style.borderRadius = '40px';
            msg.style.fontWeight = 'bold';
            msg.style.fontSize = '0.85rem';
            msg.style.zIndex = '2000';
            msg.style.border = '1px solid #f1b04a';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 1300);
        }

        function checkThresholds(sugar) {
            let played = false;
            for (let t of THRESHOLDS) {
                if (sugar >= t && !soundTriggered[t]) {
                    soundTriggered[t] = true;
                    playSound();
                    totalSounds++;
                    flashPanel(t);
                    played = true;
                }
            }
            if (played) updateUI();
        }

        // Анимация тапа
        function addTapAnim(x, y) {
            const el = document.createElement('div');
            el.className = 'tap-pop';
            el.innerText = '+0.1 🍬';
            el.style.left = `${x - 25}px`;
            el.style.top = `${y - 30}px`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 500);
        }

        function handleTap(event) {
            let clientX, clientY;
            if (event.touches) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            } else {
                clientX = event.clientX;
                clientY = event.clientY;
            }
            if (clientX && clientY) addTapAnim(clientX, clientY);
            else {
                const rect = snickersImg.getBoundingClientRect();
                addTapAnim(rect.left + rect.width/2, rect.top + rect.height/2);
            }
            currentSugar = parseFloat((currentSugar + 0.1).toFixed(2));
            totalTaps++;
            checkThresholds(currentSugar);
            updateUI();
            if (navigator.vibrate) navigator.vibrate(20);
            if (currentSugar >= 30) {
                document.body.style.transition = "0.1s";
                document.body.style.backgroundColor = "#ffccbb";
                setTimeout(() => document.body.style.backgroundColor = "", 180);
            }
        }

        function resetGame() {
            currentSugar = 0.0;
            totalTaps = 0;
            soundTriggered = { 4.2: false, 5.2: false, 6.7: false, 22.8: false };
            totalSounds = 0;
            updateUI();
            const msg = document.createElement('div');
            msg.innerText = "💉 Укол инсулина! Сахар обнулён.";
            msg.style.cssText = "position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:#000000aa; backdrop-filter:blur(6px); color:#e9f5db; padding:8px 20px; border-radius:60px; font-weight:bold; z-index:1000";
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 1500);
            if (navigator.vibrate) navigator.vibrate(50);
            document.body.style.backgroundColor = "";
        }

        // ========== ГЛАВНОЕ: УБИРАЕМ БЕЛЫЙ ФОН У PNG ==========
        function removeWhiteBackgroundFromImage(imgElement, imgPath, threshold = 240) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const tempImg = new Image();
            tempImg.crossOrigin = "Anonymous";
            tempImg.onload = () => {
                canvas.width = tempImg.width;
                canvas.height = tempImg.height;
                ctx.drawImage(tempImg, 0, 0);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                // Проходим по пикселям и делаем белые/светлые прозрачными
                for (let i = 0; i < data.length; i += 4) {
                    let r = data[i];
                    let g = data[i+1];
                    let b = data[i+2];
                    // если пиксель близок к белому (r,g,b > threshold)
                    if (r > threshold && g > threshold && b > threshold) {
                        data[i+3] = 0; // устанавливаем альфа-канал в 0 (прозрачный)
                    }
                }
                ctx.putImageData(imageData, 0, 0);
                const transparentSrc = canvas.toDataURL('image/png');
                imgElement.src = transparentSrc;
                processedImageSrc = transparentSrc;
            };
            tempImg.onerror = () => {
                // если картинка не загрузилась, показываем ошибку
                const errDiv = document.createElement('div');
                errDiv.innerText = '⚠️ Файл photo/sniker.png не найден!';
                errDiv.style.cssText = "position:fixed; bottom:20px; left:20px; background:#b91c1c; color:white; padding:5px 16px; border-radius:40px; font-size:0.7rem; z-index:9999";
                document.body.appendChild(errDiv);
                setTimeout(() => errDiv.remove(), 5000);
            };
            tempImg.src = imgPath;
        }

        // Применяем обработку фона к картинке
        removeWhiteBackgroundFromImage(snickersImg, IMG_PATH, 240);

        // Обработчики событий
        snickersImg.addEventListener('click', (e) => { e.preventDefault(); handleTap(e); });
        snickersImg.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            if (touch) handleTap({ touches: e.touches, clientX: touch.clientX, clientY: touch.clientY });
            else handleTap(e);
        });
        resetBtn.addEventListener('click', (e) => { e.preventDefault(); resetGame(); });
        resetBtn.addEventListener('touchstart', (e) => { e.preventDefault(); resetGame(); });

        // Прикол с долгим нажатием
        let pressTimer;
        snickersImg.addEventListener('mousedown', () => {
            pressTimer = setTimeout(() => {
                const joke = document.createElement('div');
                joke.innerText = "😈 ДИАБЕТИК, ТЫ ЧЕ ТАПАЕШЬ? 🤣";
                joke.style.cssText = "position:fixed; top:45%; left:50%; transform:translate(-50%,-50%); background:#000000cc; backdrop-filter:blur(12px); color:#ffd58c; padding:12px 20px; border-radius:50px; font-weight:bold; z-index:3000; border:2px solid #fcb045; white-space:nowrap";
                document.body.appendChild(joke);
                setTimeout(() => joke.remove(), 1800);
            }, 700);
        });
        snickersImg.addEventListener('mouseup', () => clearTimeout(pressTimer));
        snickersImg.addEventListener('mouseleave', () => clearTimeout(pressTimer));
        snickersImg.addEventListener('touchend', () => clearTimeout(pressTimer));

        updateUI();
    })();
</script>
</body>
</html>
